name: Deploy to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'azure-appservice/**'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.x'
  WORKING_DIR: './azure-appservice'
  PROJECT_PATH: './azure-appservice/src/SampleApp.csproj'
  PUBLISH_DIR: './azure-appservice/publish'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build and publish
        run: |
          dotnet publish src/SampleApp.csproj \
            -c Release \
            -o publish \
            --no-self-contained

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}

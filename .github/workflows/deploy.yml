name: Deploy to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'azure-appservice/**'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.x'
  WORKING_DIR: './azure-appservice'
  PROJECT_PATH: './azure-appservice/src/SampleApp.csproj'
  PUBLISH_DIR: './azure-appservice/publish'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build and publish
        run: |
          dotnet publish src/SampleApp.csproj \
            -c Release \
            -o publish \
            --no-self-contained

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        run: |
          cd publish
          zip -r ../app.zip .
          cd ..
          az webapp deploy \
            --name ${{ secrets.AZURE_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --src-path app.zip \
            --type zip
